<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA & Mobile Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="的士助手">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    
    <title>的士收入助手</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            user-select: none;
        }
        .app-container {
            padding-top: calc(var(--safe-top) + 20px);
            padding-bottom: calc(var(--safe-bottom) + 40px);
        }
        input {
            background: #1c1c1e !important;
            border: 1px solid #2c2c2e !important;
            color: white !important;
            -webkit-appearance: none;
            border-radius: 12px;
        }
        input:focus {
            border-color: #0a84ff !important;
            outline: none;
        }
        .glass-card {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .active-press:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        .bar-container {
            height: 160px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 10px 0;
        }
        .bar-segment {
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #date-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            left: 0;
            top: 0;
            height: 100%;
            cursor: pointer;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="px-4">
    <div class="app-container max-w-md mx-auto space-y-6">
        <!-- Header -->
        <header class="flex justify-between items-end">
            <div class="relative">
                <h1 class="text-3xl font-black tracking-tight text-white italic">的士收入助手</h1>
                <div class="relative inline-block mt-1">
                    <p id="display-date-text" class="text-blue-500 font-bold flex items-center gap-1 underline decoration-dotted underline-offset-4">
                        載入中... 📅
                    </p>
                    <input type="date" id="date-input">
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-500 block font-bold uppercase">該日純利</span>
                <span id="top-profit" class="text-2xl font-black text-green-500">$0</span>
            </div>
        </header>

        <!-- Income Section -->
        <section class="glass-card rounded-[2.5rem] p-6 shadow-2xl">
            <!-- 手仔收入區 -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-6 bg-purple-600 rounded-full"></div>
                        <h2 class="font-bold text-gray-300">手仔收入 (路邊)</h2>
                    </div>
                    <span class="text-xs font-black text-purple-400 bg-purple-500/10 px-3 py-1 rounded-full">$<span id="display-total-hand">0</span></span>
                </div>
                
                <div class="flex gap-2 mb-3">
                    <input type="number" id="new-hand-val" inputmode="decimal" placeholder="輸入單筆手仔收入" class="flex-1 py-3 px-4 text-sm font-bold">
                    <button onclick="addHandIncome()" class="bg-purple-600 text-white px-6 rounded-xl font-bold active-press shadow-lg shadow-purple-900/20">
                        增加
                    </button>
                </div>
                <div id="hand-list" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto custom-scrollbar"></div>
            </div>

            <div class="flex items-center gap-2 mb-5 pt-4 border-t border-white/5">
                <div class="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                <h2 class="font-bold text-gray-300">平台 App 流水</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-blue-500 ml-1">UBER</label>
                    <input type="number" id="in-uber" inputmode="decimal" placeholder="0" class="w-full py-3 px-4 text-lg font-bold">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-orange-500 ml-1">高德 (AMAP)</label>
                    <input type="number" id="in-amap" inputmode="decimal" placeholder="0" class="w-full py-3 px-4 text-lg font-bold">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-yellow-500 ml-1">滴滴 (DIDI)</label>
                    <input type="number" id="in-didi" inputmode="decimal" placeholder="0" class="w-full py-3 px-4 text-lg font-bold">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-green-500 ml-1">TADA</label>
                    <input type="number" id="in-tada" inputmode="decimal" placeholder="0" class="w-full py-3 px-4 text-lg font-bold">
                </div>
            </div>

            <!-- Expenses Section -->
            <div class="mt-8 pt-6 border-t border-white/5">
                <div class="flex items-center gap-2 mb-5">
                    <div class="w-1.5 h-6 bg-red-600 rounded-full"></div>
                    <h2 class="font-bold text-gray-300">營運支出 (油錢/租金/隧道)</h2>
                </div>
                
                <div class="flex gap-2 mb-4">
                    <input type="number" id="new-exp-val" inputmode="decimal" placeholder="輸入單筆支出金額" class="flex-1 py-3 px-4 text-sm font-bold">
                    <button onclick="addExpenseInline()" class="bg-red-600 text-white px-6 rounded-xl font-bold active-press shadow-lg shadow-red-900/20">
                        新增
                    </button>
                </div>
                
                <div id="expense-list" class="space-y-2 mb-4 max-h-40 overflow-y-auto pr-1 custom-scrollbar"></div>

                <div class="flex items-center justify-between bg-white/5 rounded-2xl p-4 border border-white/5">
                    <span class="text-gray-400 font-bold text-xs uppercase tracking-wider">今日支出總計</span>
                    <span class="text-xl font-black text-red-500">$<span id="display-total-exp">0</span></span>
                </div>
            </div>

            <button onclick="save()" class="w-full mt-6 bg-white text-black py-4 rounded-2xl font-black text-lg active-press shadow-xl transition-all hover:bg-gray-200">
                儲存當日數據
            </button>
        </section>

        <!-- Stats Section -->
        <section class="glass-card rounded-[2.5rem] p-6 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-lg text-white">本週分析</h2>
                <button onclick="clearAll()" class="text-[10px] text-gray-600 border border-gray-800 px-3 py-1.5 rounded-full font-bold uppercase tracking-widest active-press">清空數據</button>
            </div>

            <!-- Bar Chart -->
            <div class="mb-4">
                <div id="chart-container" class="bar-container border-b border-white/10"></div>
                <div class="flex justify-between px-1 mt-3 text-[10px] text-gray-600 font-black">
                    <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
                </div>
            </div>

            <div id="stats-content" class="space-y-4 pt-4"></div>
        </section>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-4 rounded-3xl text-sm font-black opacity-0 shadow-2xl transition-all duration-300 pointer-events-none z-50">
        已儲存
    </div>

    <script>
        const STORAGE_KEY = 'taxi_helper_pro_v2';
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        let currentDayExpenses = [];
        let currentDayHandIncomes = [];
        let selectedDate = new Date().toISOString().split('T')[0];

        function formatDisplayDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('zh-HK', { month: 'long', day: 'numeric', weekday: 'short' });
        }

        function getWeekKeys(baseDateStr) {
            const now = new Date(baseDateStr);
            const day = now.getDay();
            const diff = now.getDate() - (day === 0 ? 6 : day - 1); 
            const start = new Date(now.setDate(diff));
            const keys = [];
            for (let i = 0; i < 7; i++) {
                const temp = new Date(start);
                temp.setDate(start.getDate() + i);
                keys.push(temp.toISOString().split('T')[0]);
            }
            return keys;
        }

        function loadDateData(dateStr) {
            selectedDate = dateStr;
            document.getElementById('display-date-text').innerText = formatDisplayDate(dateStr) + " 📅";
            
            if (db[dateStr]) {
                document.getElementById('in-uber').value = db[dateStr].u || "";
                document.getElementById('in-amap').value = db[dateStr].a || "";
                document.getElementById('in-didi').value = db[dateStr].d || "";
                document.getElementById('in-tada').value = db[dateStr].t || "";
                currentDayExpenses = db[dateStr].e_list || [];
                currentDayHandIncomes = db[dateStr].h_list || [];
            } else {
                document.getElementById('in-uber').value = "";
                document.getElementById('in-amap').value = "";
                document.getElementById('in-didi').value = "";
                document.getElementById('in-tada').value = "";
                currentDayExpenses = [];
                currentDayHandIncomes = [];
            }
            renderExpenseList();
            renderHandList();
            updateTopProfitPreview();
            refreshCharts();
        }

        // 手仔收入管理
        function addHandIncome() {
            const input = document.getElementById('new-hand-val');
            const num = parseFloat(input.value);
            if (!isNaN(num) && num > 0) {
                currentDayHandIncomes.push(num);
                input.value = "";
                renderHandList();
                updateTopProfitPreview();
                input.blur();
            }
        }

        function removeHand(index) {
            currentDayHandIncomes.splice(index, 1);
            renderHandList();
            updateTopProfitPreview();
        }

        function renderHandList() {
            const listEl = document.getElementById('hand-list');
            const totalEl = document.getElementById('display-total-hand');
            let total = 0;
            if (currentDayHandIncomes.length === 0) {
                listEl.innerHTML = `<p class="text-[10px] text-gray-700 italic">尚未記錄路邊收入</p>`;
                totalEl.innerText = "0";
                return;
            }
            let html = '';
            currentDayHandIncomes.forEach((amt, idx) => {
                total += amt;
                html += `
                    <div onclick="removeHand(${idx})" class="bg-purple-500/20 text-purple-400 px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1 active-press">
                        $${amt} <span class="opacity-30">✕</span>
                    </div>
                `;
            });
            listEl.innerHTML = html;
            totalEl.innerText = total.toLocaleString();
        }

        // 支出管理
        function addExpenseInline() {
            const input = document.getElementById('new-exp-val');
            const num = parseFloat(input.value);
            if (!isNaN(num) && num > 0) {
                currentDayExpenses.push(num);
                input.value = "";
                renderExpenseList();
                updateTopProfitPreview();
                input.blur();
            }
        }

        function removeExpense(index) {
            currentDayExpenses.splice(index, 1);
            renderExpenseList();
            updateTopProfitPreview();
        }

        function renderExpenseList() {
            const listEl = document.getElementById('expense-list');
            const totalEl = document.getElementById('display-total-exp');
            let total = 0;
            if (currentDayExpenses.length === 0) {
                listEl.innerHTML = `<p class="text-[10px] text-gray-700 italic py-2">該日無額外支出紀錄</p>`;
                totalEl.innerText = "0";
                return;
            }
            let html = '';
            currentDayExpenses.forEach((amt, idx) => {
                total += amt;
                html += `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                        <span class="text-xs font-bold text-gray-500">支出 ${idx + 1}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-black text-red-500">$${amt.toLocaleString()}</span>
                            <button onclick="removeExpense(${idx})" class="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-500 rounded-full text-xs active-press">✕</button>
                        </div>
                    </div>
                `;
            });
            listEl.innerHTML = html;
            totalEl.innerText = total.toLocaleString();
        }

        function updateTopProfitPreview() {
            const h = currentDayHandIncomes.reduce((a, b) => a + b, 0);
            const u = parseFloat(document.getElementById('in-uber').value) || 0;
            const a = parseFloat(document.getElementById('in-amap').value) || 0;
            const d = parseFloat(document.getElementById('in-didi').value) || 0;
            const t = parseFloat(document.getElementById('in-tada').value) || 0;
            const totalExp = currentDayExpenses.reduce((a, b) => a + b, 0);
            const profit = (h + u + a + d + t) - totalExp;
            document.getElementById('top-profit').innerText = `$${profit.toLocaleString()}`;
        }

        function save() {
            const h_total = currentDayHandIncomes.reduce((a, b) => a + b, 0);
            db[selectedDate] = {
                h: h_total,
                h_list: [...currentDayHandIncomes],
                u: parseFloat(document.getElementById('in-uber').value) || 0,
                a: parseFloat(document.getElementById('in-amap').value) || 0,
                d: parseFloat(document.getElementById('in-didi').value) || 0,
                t: parseFloat(document.getElementById('in-tada').value) || 0,
                e_list: [...currentDayExpenses],
                e_total: currentDayExpenses.reduce((a, b) => a + b, 0)
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            showToast("數據已安全儲存");
            refreshCharts();
        }

        function refreshCharts() {
            const week = getWeekKeys(selectedDate);
            let weekSum = { h: 0, u: 0, a: 0, d: 0, t: 0, e: 0 };
            let dailyTotals = [];
            let maxDayTotal = 0;

            week.forEach(k => {
                const d = db[k] || { h: 0, u: 0, a: 0, d: 0, t: 0, e_total: 0 };
                const dayTotal = (d.h || 0) + (d.u || 0) + (d.a || 0) + (d.d || 0) + (d.t || 0);
                dailyTotals.push({ ...d, total: dayTotal, key: k });
                if (dayTotal > maxDayTotal) maxDayTotal = dayTotal;
                
                weekSum.h += (d.h || 0); weekSum.u += (d.u || 0); weekSum.a += (d.a || 0);
                weekSum.d += (d.d || 0); weekSum.t += (d.t || 0);
                weekSum.e += (d.e_total || 0);
            });

            const chartContainer = document.getElementById('chart-container');
            chartContainer.innerHTML = '';
            dailyTotals.forEach(day => {
                const bar = document.createElement('div');
                bar.className = `flex-1 flex flex-col justify-end gap-0.5 relative ${day.key === selectedDate ? 'bg-blue-500/10 rounded-lg' : ''}`;
                const getH = (val) => maxDayTotal > 0 ? (val / maxDayTotal * 100) : 0;
                
                bar.innerHTML = `
                    <div class="w-full bg-green-500 bar-segment rounded-t-sm" style="height: ${getH(day.t)}%; background-color: #22c55e;"></div>
                    <div class="w-full bg-yellow-500 bar-segment" style="height: ${getH(day.d)}%; background-color: #eab308;"></div>
                    <div class="w-full bg-orange-500 bar-segment" style="height: ${getH(day.a)}%; background-color: #f97316;"></div>
                    <div class="w-full bg-blue-500 bar-segment" style="height: ${getH(day.u)}%; background-color: #3b82f6;"></div>
                    <div class="w-full bg-purple-500 bar-segment rounded-b-sm" style="height: ${getH(day.h)}%; background-color: #9333ea;"></div>
                `;
                chartContainer.appendChild(bar);
            });

            const totalIn = weekSum.h + weekSum.u + weekSum.a + weekSum.d + weekSum.t;
            const net = totalIn - weekSum.e;
            
            document.getElementById('stats-content').innerHTML = `
                <div class="bg-blue-500/5 p-4 rounded-3xl border border-blue-500/10 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black text-blue-400 uppercase tracking-widest">本週的士營收概覽</span>
                        <span class="text-[10px] text-gray-500">${week[0]} 至 ${week[6]}</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <div>
                            <p class="text-[10px] text-gray-500 font-bold uppercase">總流水收入</p>
                            <p class="text-xl font-black text-white">$${totalIn.toLocaleString()}</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-red-500 font-bold uppercase">總支出(租/油)</p>
                            <p class="text-xl font-black text-red-500">-$${weekSum.e.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="bg-green-500 p-4 rounded-2xl flex justify-between items-center shadow-lg shadow-green-900/20">
                        <span class="text-black font-black text-sm italic uppercase">本週純利收益</span>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>的士收入紀錄</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary-color: #2ecc71;
            --accent-color: #3498db;
            --danger-color: #e74c3c;
            --border-color: #dddddd;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #f0f0f0;
            --primary-color: #27ae60;
            --border-color: #444444;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 15px;
            padding-bottom: 80px;
            transition: 0.3s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            padding: 5px 0;
        }

        .profit-badge {
            background: var(--primary-color);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }

        h3 { margin: 15px 0 10px 0; font-size: 1rem; color: var(--accent-color); }

        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8; }
        input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            outline: none;
        }

        .record-card {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid var(--accent-color);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .expense-card { border-left-color: var(--danger-color); }

        .record-card input { font-size: 0.9rem; font-weight: normal; border-bottom: 1px solid var(--border-color); }

        .btn {
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add { background: var(--accent-color); color: white; width: 100%; margin-top: 5px; }
        .btn-del { background: var(--danger-color); color: white; padding: 5px 10px; }

        .footer-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            padding: 15px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h2>紀錄</h2>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div id="topProfit" class="profit-badge">$ 0</div>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>
</header>

<h3>平台收入</h3>
<div class="platform-grid">
    <div class="input-group"><label>Uber</label><input type="number" class="calc-trigger" id="p-uber" placeholder="0"></div>
    <div class="input-group"><label>高德</label><input type="number" class="calc-trigger" id="p-amap" placeholder="0"></div>
    <div class="input-group"><label>滴滴</label><input type="number" class="calc-trigger" id="p-didi" placeholder="0"></div>
    <div class="input-group"><label>Dash</label><input type="number" class="calc-trigger" id="p-dash" placeholder="0"></div>
</div>

<h3>其他收入 (行程)</h3>
<div id="otherIncomeList"></div>
<button class="btn btn-add" onclick="addRow('otherIncomeList')">+ 新增行程</button>

<h3>支出紀錄</h3>
<div id="expenseList"></div>
<button class="btn btn-add" style="background: #95a5a6;" onclick="addRow('expenseList')">+ 新增支出項目</button>

<div class="footer-info">
    今日純利潤: <span id="totalProfit" style="color: var(--primary-color);">$ 0</span>
</div>

<script>
    // 初始化與讀取資料
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        if(localStorage.getItem('theme') === 'dark') toggleTheme(true);
        calculate();
    });

    // 新增行
    function addRow(containerId, data = {val1: '', val2: '', price: ''}) {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = `record-card ${containerId === 'expenseList' ? 'expense-card' : ''}`;
        
        if(containerId === 'otherIncomeList') {
            div.innerHTML = `
                <input type="text" placeholder="起點" value="${data.val1}" oninput="saveData()">
                <input type="text" placeholder="終點" value="${data.val2}" oninput="saveData()">
                <input type="number" class="calc-trigger" placeholder="價錢" value="${data.price}" style="width: 80px" oninput="calculate()">
                <button class="btn btn-del" onclick="this.parentElement.remove(); calculate();">✕</button>
            `;
        } else {
            div.innerHTML = `
                <input type="text" placeholder="項目" value="${data.val1}" style="flex:2" oninput="saveData()">
                <input type="number" class="calc-trigger" placeholder="金額" value="${data.price}" style="flex:1" oninput="calculate()">
                <button class="btn btn-del" onclick="this.parentElement.remove(); calculate();">✕</button>
            `;
        }
        container.appendChild(div);
        calculate();
    }

    // 計算邏輯
    function calculate() {
        let total = 0;
        // 平台
        total += Number(document.getElementById('p-uber').value) || 0;
        total += Number(document.getElementById('p-amap').value) || 0;
        total += Number(document.getElementById('p-didi').value) || 0;
        total += Number(document.getElementById('p-dash').value) || 0;

        // 其他收入
        document.querySelectorAll('#otherIncomeList input[type="number"]').forEach(input => {
            total += Number(input.value) || 0;
        });

        // 支出
        document.querySelectorAll('#expenseList input[type="number"]').forEach(input => {
            total -= Number(input.value) || 0;
        });

        const formatted = `$ ${total}`;
        document.getElementById('totalProfit').innerText = formatted;
        document.getElementById('topProfit').innerText = formatted;
        saveData();
    }

    // localStorage 儲存
    function saveData() {
        const data = {
            platforms: {
                uber: document.getElementById('p-uber').value,
                amap: document.getElementById('p-amap').value,
                didi: document.getElementById('p-didi').value,
                dash: document.getElementById('p-dash').value,
            },
            otherIncomes: Array.from(document.querySelectorAll('#otherIncomeList .record-card')).map(el => ({
                val1: el.querySelectorAll('input')[0].value,
                val2: el.querySelectorAll('input')[1].value,
                price: el.querySelectorAll('input')[2].value
            })),
            expenses: Array.from(document.querySelectorAll('#expenseList .record-card')).map(el => ({
                val1: el.querySelectorAll('input')[0].value,
                price: el.querySelectorAll('input')[1].value
            }))
        };
        localStorage.setItem('taxi_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('taxi_data');
        if(!saved) return;
        const data = JSON.parse(saved);
        
        document.getElementById('p-uber').value = data.platforms.uber;
        document.getElementById('p-amap').value = data.platforms.amap;
        document.getElementById('p-didi').value = data.platforms.didi;
        document.getElementById('p-dash').value = data.platforms.dash;

        data.otherIncomes.forEach(item => addRow('otherIncomeList', item));
        data.expenses.forEach(item => addRow('expenseList', item));
    }

    // 日夜切換
    function toggleTheme(init = false) {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = (currentTheme === 'dark' || (init && localStorage.getItem('theme') !== 'dark')) ? 'light' : 'dark';
        
        if(init && localStorage.getItem('theme')) {
            body.setAttribute('data-theme', localStorage.getItem('theme'));
        } else {
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
    }

    // 監聽所有平台輸入框
    document.querySelectorAll('.calc-trigger').forEach(input => {
        input.addEventListener('input', calculate);
    });
</script>

</body>
</html>
